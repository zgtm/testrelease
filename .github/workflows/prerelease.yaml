name: Release

on:
  push:
    tags:
      - "mysoftware/v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:

      - name: Create GitHub Pre-Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --prerelease
            --verify-tag \
            --generate-notes \
            --title "${GITHUB_REF_NAME}"

      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          touch hello.txt
          gh release upload "${GITHUB_REF_NAME}" hello.txt
